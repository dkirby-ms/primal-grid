<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primal Grid</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: #cccccc;
      }
      #game-wrapper {
        display: flex;
        flex-direction: row;
        border: 1px solid #2a2a4a;
        border-radius: 4px;
        overflow: hidden;
      }
      #app {
        width: 600px;
        height: 600px;
        flex-shrink: 0;
      }
      #hud-panel {
        width: 200px;
        height: 600px;
        background: #1a1a2e;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #hud-panel .hud-section {
        padding: 8px 10px;
        border-bottom: 1px solid #2a2a4a;
      }
      #hud-panel .hud-section:last-child {
        border-bottom: none;
      }
      #hud-panel .hud-section h3 {
        font-size: 10px;
        text-transform: uppercase;
        color: #888;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      /* Stat bars (legacy, kept for potential reuse) */
      .stat-bar-wrap {
        margin-bottom: 4px;
      }
      .stat-bar-wrap .bar-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 2px;
      }
      .stat-bar {
        width: 100%;
        height: 12px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
      }
      .stat-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.15s ease, background 0.3s ease;
      }
      /* Inventory items */
      .inv-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 1px 0;
      }
      .inv-row .inv-icon { flex-shrink: 0; }
      .inv-row .inv-count {
        color: #ddd;
        font-weight: bold;
      }
      /* Creatures */
      .creature-row {
        font-size: 12px;
        padding: 1px 0;
      }
      /* Builder button */
      #spawn-builder-btn:not(:disabled):hover {
        background: #3a3a5a;
        border-color: #7ecfff;
        color: #ffffff;
      }
      #spawn-builder-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #spawn-defender-btn:not(:disabled):hover,
      #spawn-attacker-btn:not(:disabled):hover {
        background: #3a3a5a;
        border-color: #7ecfff;
        color: #ffffff;
      }
      #spawn-defender-btn:disabled,
      #spawn-attacker-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      /* Outer container for centering game-wrapper + log together */
      #game-outer {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      /* Game log panel */
      #game-log {
        width: 800px;
        height: 120px;
        overflow-y: auto;
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-top: none;
        border-radius: 0 0 4px 4px;
        padding: 6px 10px;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        color: #cccccc;
      }
      #game-log .log-entry {
        line-height: 1.5;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* Help hint */
      #help-hint {
        align-self: flex-end;
        font-size: 11px;
        color: #888888;
        font-family: 'Courier New', monospace;
        pointer-events: none;
        padding: 4px 4px 0 0;
      }

      /* Name prompt modal */
      #name-prompt-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      #name-prompt-overlay.visible { display: flex; }
      #name-prompt-box {
        background: #1a1a2e;
        border: 1px solid #444466;
        border-radius: 8px;
        padding: 24px 32px;
        text-align: center;
        min-width: 300px;
      }
      #name-prompt-box h2 {
        font-size: 16px;
        color: #ffd700;
        margin-bottom: 12px;
        font-family: 'Courier New', monospace;
      }
      #name-prompt-input {
        width: 100%;
        padding: 8px 10px;
        font-size: 14px;
        font-family: 'Courier New', monospace;
        background: #222;
        color: #ffffff;
        border: 1px solid #444466;
        border-radius: 4px;
        outline: none;
        margin-bottom: 12px;
      }
      #name-prompt-input:focus { border-color: #7ecfff; }
      #name-prompt-submit {
        padding: 8px 20px;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        background: #2a2a4a;
        color: #cccccc;
        border: 1px solid #444466;
        border-radius: 4px;
        cursor: pointer;
      }
      #name-prompt-submit:hover { background: #3a3a5a; border-color: #7ecfff; color: #fff; }

      /* Scoreboard overlay */
      #scoreboard-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 900;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }
      #scoreboard-overlay.visible { display: flex; }
      #scoreboard-panel {
        background: rgba(17,17,34,0.92);
        border: 1px solid #444466;
        border-radius: 8px;
        padding: 16px 24px;
        min-width: 420px;
        pointer-events: auto;
      }
      #scoreboard-panel h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #ffd700;
        margin-bottom: 10px;
        text-align: center;
        font-family: 'Courier New', monospace;
      }
      #scoreboard-table {
        width: 100%;
        border-collapse: collapse;
        font-family: 'Courier New', monospace;
        font-size: 12px;
      }
      #scoreboard-table th {
        text-align: left;
        color: #888;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 8px;
        border-bottom: 1px solid #333;
      }
      #scoreboard-table td {
        padding: 5px 8px;
        color: #cccccc;
        border-bottom: 1px solid #222;
      }
      #scoreboard-table tr:last-child td { border-bottom: none; }
      #scoreboard-hint {
        text-align: center;
        font-size: 10px;
        color: #666;
        margin-top: 8px;
        font-family: 'Courier New', monospace;
      }

    </style>
  </head>
  <body>
    <div id="game-outer">
    <div id="game-wrapper">
      <div id="app"></div>
      <div id="hud-panel">
        <div class="hud-section" id="section-day-phase">
          <h3>Time of Day</h3>
          <div id="day-phase-display" style="font-size:14px;font-weight:bold;color:#ffa726">☀️ Day</div>
        </div>
        <div class="hud-section" id="section-level">
          <h3>Level</h3>
          <div style="font-size:14px;font-weight:bold;color:#7ecfff">⭐ Level <span id="level-val">1</span></div>
          <div class="stat-bar-wrap" style="margin-top:4px;">
            <div class="bar-label"><span>XP</span><span id="xp-text">0 / 10</span></div>
            <div class="stat-bar">
              <div class="stat-bar-fill" id="xp-bar-fill" style="width:0%;background:#7ecfff;"></div>
            </div>
          </div>
        </div>
        <div class="hud-section" id="territory-count">
          <h3>Territory</h3>
          <div style="font-size:16px;font-weight:bold;color:#ffd700">🏰 <span id="territory-count-val">0</span> tiles</div>
        </div>
        <div class="hud-section" id="section-inventory">
          <h3>Inventory</h3>
          <div class="inv-row"><span class="inv-icon">🪵 Wood</span><span class="inv-count" id="inv-wood">0</span></div>
          <div class="inv-row"><span class="inv-icon">🪨 Stone</span><span class="inv-count" id="inv-stone">0</span></div>
        </div>
        <div class="hud-section" id="section-creatures">
          <h3>Creatures</h3>
          <div class="creature-row" id="creature-counts">🦕 0 &nbsp; 🦖 0</div>
        </div>
        <div class="hud-section" id="section-builders">
          <h3>Builders</h3>
          <div id="builder-count" style="font-size:12px;margin-bottom:6px;">Builders: 0/5</div>
          <button id="spawn-builder-btn" disabled style="
            width:100%;
            padding:6px 4px;
            font-size:11px;
            font-family:'Courier New',monospace;
            background:#2a2a4a;
            color:#cccccc;
            border:1px solid #444466;
            border-radius:4px;
            cursor:pointer;
          ">🔨 Spawn Builder (10W, 5S)</button>
        </div>

        <div class="hud-section" id="section-combat">
          <h3>Combat</h3>
          <div id="enemy-base-count" style="font-size:12px;margin-bottom:6px;color:#ff6666;">No threats</div>
          <div style="display:flex;gap:4px;font-size:11px;margin-bottom:6px;">
            <span id="defender-count">🛡 0/3</span>
            <span id="attacker-count">⚔ 0/2</span>
          </div>
          <button id="spawn-defender-btn" disabled style="
            width:100%;
            padding:6px 4px;
            font-size:11px;
            font-family:'Courier New',monospace;
            background:#2a2a4a;
            color:#cccccc;
            border:1px solid #444466;
            border-radius:4px;
            cursor:pointer;
            margin-bottom:4px;
          ">🛡 Spawn Defender (15W, 10S)</button>
          <button id="spawn-attacker-btn" disabled style="
            width:100%;
            padding:6px 4px;
            font-size:11px;
            font-family:'Courier New',monospace;
            background:#2a2a4a;
            color:#cccccc;
            border:1px solid #444466;
            border-radius:4px;
            cursor:pointer;
          ">⚔ Spawn Attacker (20W, 15S)</button>
        </div>

      </div>
    </div>
    <div id="game-log"></div>
    <div id="help-hint">Press ? for help</div>
    </div>

    <!-- Name prompt modal -->
    <div id="name-prompt-overlay">
      <div id="name-prompt-box">
        <h2>🏰 Enter Your Name</h2>
        <input id="name-prompt-input" type="text" maxlength="20" placeholder="Explorer" autocomplete="off" />
        <br />
        <button id="name-prompt-submit">Join Game</button>
      </div>
    </div>

    <!-- Scoreboard overlay (Tab key) -->
    <div id="scoreboard-overlay">
      <div id="scoreboard-panel">
        <h2>🏆 Scoreboard</h2>
        <table id="scoreboard-table">
          <thead><tr><th>Player</th><th>Score</th><th>Territory</th></tr></thead>
          <tbody id="scoreboard-body"></tbody>
        </table>
        <div id="scoreboard-hint">Press Tab to close</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
