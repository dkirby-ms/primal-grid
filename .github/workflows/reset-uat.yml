name: Reset UAT to Prod

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "uat-reset"
  cancel-in-progress: true

jobs:
  reset-uat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UAT_RESET_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Reset UAT branch to prod
        run: |
          git fetch origin uat:uat || true
          git checkout uat
          git reset --hard prod
          git push --force-with-lease origin uat

      - name: Report outcome
        run: |
          echo "### ✅ UAT branch reset to prod" >> "$GITHUB_STEP_SUMMARY"
          echo "**Master commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "UAT will now redeploy via deploy-uat.yml workflow." >> "$GITHUB_STEP_SUMMARY"
