name: Squad Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Promotion target'
        required: true
        default: 'dev-to-uat'
        type: choice
        options:
          - 'dev-to-uat'
          - 'uat-to-prod'

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-dev-to-uat:
    name: Create PR — dev → uat
    if: ${{ inputs.target == 'dev-to-uat' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all branches
        run: git fetch --all

      - name: Check for differences
        id: diff
        run: |
          DIFF_COUNT=$(git rev-list --count origin/uat..origin/dev)
          echo "commit_count=$DIFF_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$DIFF_COUNT" = "0" ]; then
            echo "ℹ️ No new commits — uat is already up to date with dev"
          else
            echo "📦 $DIFF_COUNT commit(s) to promote"
            git log --oneline origin/uat..origin/dev
          fi

      - name: Bump patch version
        if: steps.diff.outputs.commit_count != '0'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git push origin dev
          echo "📦 Bumped version to v${NEW_VERSION}"

      - name: Create promotion PR
        if: steps.diff.outputs.commit_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for existing open PR
          EXISTING=$(gh pr list --base uat --head dev --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "ℹ️ PR #$EXISTING already exists for dev → uat"
            echo "### ℹ️ Existing PR #$EXISTING" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            VERSION=$(git rev-parse --short HEAD)
            echo "⚠️ package.json missing version field — falling back to git SHA: $VERSION"
          fi
          CHANGELOG=$(git log --pretty=format:'- %h %s' origin/uat..origin/dev | head -20)

          gh pr create \
            --base uat \
            --head dev \
            --title "Promote dev → uat (v${VERSION})" \
            --body "## Promotion: dev → uat

          **Version:** v${VERSION}
          **Commits:** ${{ steps.diff.outputs.commit_count }}

          ### Changes
          ${CHANGELOG}

          ---
          > Reviewer: @copilot (automated review per PR review gates)
          > Created by \`squad-promote.yml\` workflow dispatch"

          echo "### ✅ PR created for dev → uat" >> "$GITHUB_STEP_SUMMARY"

  promote-uat-to-prod:
    name: Create PR — uat → prod
    if: ${{ inputs.target == 'uat-to-prod' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch --all

      - name: Check for differences
        id: diff
        run: |
          DIFF_COUNT=$(git rev-list --count origin/prod..origin/uat)
          echo "commit_count=$DIFF_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$DIFF_COUNT" = "0" ]; then
            echo "ℹ️ No new commits — prod is already up to date with uat"
          else
            echo "📦 $DIFF_COUNT commit(s) to promote"
            git log --oneline origin/prod..origin/uat
          fi

      - name: Create staging branch (strip forbidden files)
        if: steps.diff.outputs.commit_count != '0'
        id: staging
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            VERSION=$(git rev-parse --short HEAD)
            echo "⚠️ package.json missing version field — falling back to git SHA: $VERSION"
          fi
          BRANCH="promote/prod-v${VERSION}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Create staging branch from uat
          git checkout -b "$BRANCH" origin/uat

          # Strip forbidden paths
          git rm -rf --cached --ignore-unmatch \
            .ai-team/ \
            .squad/ \
            .ai-team-templates/ \
            team-docs/ \
            "docs/proposals/" || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: strip squad/team files for production"
          fi

          git push --force origin "$BRANCH"
          echo "✅ Staging branch $BRANCH created"

      - name: Create promotion PR
        if: steps.diff.outputs.commit_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for existing open PR from any promote/ branch
          EXISTING=$(gh pr list --base prod --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("promote/")) | .number' 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            echo "ℹ️ PR #$EXISTING already exists for uat → prod"
            echo "### ℹ️ Existing PR #$EXISTING" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          CHANGELOG=$(git log --pretty=format:'- %h %s' origin/prod..origin/uat | head -20)

          gh pr create \
            --base prod \
            --head "${{ steps.staging.outputs.branch }}" \
            --title "Release: uat → prod (v${{ steps.staging.outputs.version }})" \
            --body "## Release: uat → prod

          **Version:** v${{ steps.staging.outputs.version }}
          **Commits:** ${{ steps.diff.outputs.commit_count }}

          ### Changes
          ${CHANGELOG}

          ---
          > ⚠️ \`.squad/\` files have been stripped from this branch for production.
          > Reviewer: @dkirby-ms (manual production gate)
          > Created by \`squad-promote.yml\` workflow dispatch"

          echo "### ✅ PR created for uat → prod" >> "$GITHUB_STEP_SUMMARY"
