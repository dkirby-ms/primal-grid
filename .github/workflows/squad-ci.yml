name: Squad CI

on:
  pull_request:
    branches: [dev, uat, prod]
    types: [opened, synchronize, reopened]
    paths:
      - 'client/src/**'
      - 'server/src/**'
      - 'shared/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.*'
  push:
    branches: [dev]
    paths:
      - 'client/src/**'
      - 'server/src/**'
      - 'shared/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build -w shared
      - run: npm test
