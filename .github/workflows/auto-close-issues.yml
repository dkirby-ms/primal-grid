name: Auto-Close Linked Issues

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues linked in PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          echo "🔍 Scanning PR #${PR_NUMBER} body for linked issues..."

          # Extract issue numbers from Closes/Fixes/Resolves patterns (case-insensitive)
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -ioP '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\K[0-9]+' | sort -u)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "ℹ️ No linked issues found in PR body. Nothing to do."
            exit 0
          fi

          echo "📋 Found linked issues: $(echo $ISSUE_NUMBERS | tr '\n' ' ')"

          for ISSUE in $ISSUE_NUMBERS; do
            echo "---"
            echo "Processing issue #${ISSUE}..."

            # Check current issue state (skip if already closed)
            STATE=$(gh issue view "$ISSUE" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATE" = "NOT_FOUND" ]; then
              echo "⚠️ Issue #${ISSUE} not found — skipping."
              continue
            fi

            if [ "$STATE" = "CLOSED" ]; then
              echo "✅ Issue #${ISSUE} is already closed — skipping."
              continue
            fi

            # Close the issue with a comment linking to the merged PR
            gh issue comment "$ISSUE" --repo "$REPO" \
              --body "Closed by PR #${PR_NUMBER} (squash-merged). Auto-closed by workflow."

            gh issue close "$ISSUE" --repo "$REPO" \
              --reason completed

            echo "✅ Closed issue #${ISSUE}"
          done

          echo "🏁 Done."
