<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primal Grid</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: #cccccc;
      }
      #game-wrapper {
        display: flex;
        flex-direction: row;
        border: 1px solid #2a2a4a;
        border-radius: 4px;
        overflow: hidden;
      }
      #app {
        width: 600px;
        height: 600px;
        flex-shrink: 0;
      }
      #hud-panel {
        width: 200px;
        height: 600px;
        background: #1a1a2e;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      #hud-panel .hud-section {
        padding: 8px 10px;
        border-bottom: 1px solid #2a2a4a;
      }
      #hud-panel .hud-section:last-child {
        border-bottom: none;
      }
      #hud-panel .hud-section h3 {
        font-size: 10px;
        text-transform: uppercase;
        color: #888;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      /* Stat bars (legacy, kept for potential reuse) */
      .stat-bar-wrap {
        margin-bottom: 4px;
      }
      .stat-bar-wrap .bar-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 2px;
      }
      .stat-bar {
        width: 100%;
        height: 12px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
      }
      .stat-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.15s ease, background 0.3s ease;
      }
      /* Inventory items */
      .inv-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 1px 0;
      }
      .inv-row .inv-icon { flex-shrink: 0; }
      .inv-row .inv-count {
        color: #ddd;
        font-weight: bold;
      }
      /* Creatures */
      .creature-row {
        font-size: 12px;
        padding: 1px 0;
      }
      /* Builder button */
      #spawn-builder-btn:not(:disabled):hover {
        background: #3a3a5a;
        border-color: #7ecfff;
        color: #ffffff;
      }
      #spawn-builder-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      /* Outer container for centering game-wrapper + log together */
      #game-outer {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      /* Game log panel */
      #game-log {
        width: 800px;
        height: 120px;
        overflow-y: auto;
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-top: none;
        border-radius: 0 0 4px 4px;
        padding: 6px 10px;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        color: #cccccc;
      }
      #game-log .log-entry {
        line-height: 1.5;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* Help hint */
      #help-hint {
        align-self: flex-end;
        font-size: 11px;
        color: #888888;
        font-family: 'Courier New', monospace;
        pointer-events: none;
        padding: 4px 4px 0 0;
      }

    </style>
  </head>
  <body>
    <div id="game-outer">
    <div id="game-wrapper">
      <div id="app"></div>
      <div id="hud-panel">
        <div class="hud-section" id="section-day-phase">
          <h3>Time of Day</h3>
          <div id="day-phase-display" style="font-size:14px;font-weight:bold;color:#ffa726">☀️ Day</div>
        </div>
        <div class="hud-section" id="section-level">
          <h3>Level</h3>
          <div style="font-size:14px;font-weight:bold;color:#7ecfff">⭐ Level <span id="level-val">1</span></div>
          <div class="stat-bar-wrap" style="margin-top:4px;">
            <div class="bar-label"><span>XP</span><span id="xp-text">0 / 10</span></div>
            <div class="stat-bar">
              <div class="stat-bar-fill" id="xp-bar-fill" style="width:0%;background:#7ecfff;"></div>
            </div>
          </div>
        </div>
        <div class="hud-section" id="territory-count">
          <h3>Territory</h3>
          <div style="font-size:16px;font-weight:bold;color:#ffd700">🏰 <span id="territory-count-val">0</span> tiles</div>
        </div>
        <div class="hud-section" id="section-inventory">
          <h3>Inventory</h3>
          <div class="inv-row"><span class="inv-icon">🪵 Wood</span><span class="inv-count" id="inv-wood">0</span></div>
          <div class="inv-row"><span class="inv-icon">🪨 Stone</span><span class="inv-count" id="inv-stone">0</span></div>
        </div>
        <div class="hud-section" id="section-creatures">
          <h3>Creatures</h3>
          <div class="creature-row" id="creature-counts">🦕 0 &nbsp; 🦖 0</div>
        </div>
        <div class="hud-section" id="section-builders">
          <h3>Builders</h3>
          <div id="builder-count" style="font-size:12px;margin-bottom:6px;">Builders: 0/5</div>
          <button id="spawn-builder-btn" disabled style="
            width:100%;
            padding:6px 4px;
            font-size:11px;
            font-family:'Courier New',monospace;
            background:#2a2a4a;
            color:#cccccc;
            border:1px solid #444466;
            border-radius:4px;
            cursor:pointer;
          ">🔨 Spawn Builder (10W, 5S)</button>
        </div>

      </div>
    </div>
    <div id="game-log"></div>
    <div id="help-hint">Press ? for help</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
