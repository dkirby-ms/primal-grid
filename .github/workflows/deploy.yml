name: Deploy Primal Grid

on:
  push:
    branches: [prod]
    paths-ignore:
      - 'docs/**'
      - 'infra/**'
      - '.squad/**'
      - '.github/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w shared
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/primal-grid:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/primal-grid:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          az containerapp secret set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --secrets jwt-secret=${{ secrets.JWT_SECRET }}
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/primal-grid:${{ github.sha }} \
            --set-env-vars JWT_SECRET=secretref:jwt-secret

      - name: Output app URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "### 🎮 Deployed to https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
    outputs:
      fqdn: ${{ steps.get-url.outputs.fqdn }}

  discord-notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DEPLOY_RESULT: ${{ needs.deploy.result }}
      DEPLOY_URL: "https://gridwar.kirbytoso.xyz"
      REPOSITORY: ${{ github.repository }}
      COMMIT_SHA: ${{ github.sha }}
      REF_NAME: ${{ github.ref_name }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Send Discord notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        run: |
          # Set status and color based on deploy result
          if [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS="✅ Production Deployment Successful"
            COLOR=3066993
          else
            STATUS="❌ Production Deployment Failed"
            COLOR=15158332
          fi

          # Checkout with full history for changelog
          git clone --depth 50 https://github.com/${REPOSITORY}.git repo
          cd repo
          git fetch --depth 50 origin prod

          # Generate changelog (last 10 commits, no merges, features/fixes first)
          RAW_LOG=$(git log --no-merges --pretty=format:'• %h %s (%an)' HEAD~10..HEAD 2>/dev/null | head -20)
          RAW_LOG=$(echo "$RAW_LOG" | grep -vE ' (squad|ci|chore)[:(]' || true)
          FEATURES=$(echo "$RAW_LOG" | grep -iE '^• [a-f0-9]+ (feat|fix)' || true)
          OTHER=$(echo "$RAW_LOG" | grep -viE '^• [a-f0-9]+ (feat|fix)' || true)
          CHANGELOG=$(printf '%s\n%s' "$FEATURES" "$OTHER" | sed '/^$/d' | head -10)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="• No recent commits available"
          fi

          # Truncate changelog if too long (Discord field limit ~1024 chars)
          if [ ${#CHANGELOG} -gt 1000 ]; then
            CHANGELOG="${CHANGELOG:0:1000}..."
          fi

          # Build fields array with jq for safe JSON escaping
          RUN_URL="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMIT_URL="https://github.com/${REPOSITORY}/commit/${COMMIT_SHA}"

          FIELDS=$(jq -n \
            --arg env "🎮 Production" \
            --arg url "${DEPLOY_URL}" \
            '[{"name": "Environment", "value": $env, "inline": true},
              {"name": "🌐 Deployed URL", "value": "[Open App](\($url))", "inline": false}]')

          # Add changelog field
          FIELDS=$(echo "$FIELDS" | jq --arg changelog "$CHANGELOG" \
            '. + [{"name": "📜 Changelog", "value": $changelog, "inline": false}]')

          # Add commit info
          FIELDS=$(echo "$FIELDS" | jq \
            --arg sha "$SHORT_SHA" --arg url "$COMMIT_URL" \
            '. + [{"name": "📝 Commit", "value": "[`\($sha)`](\($url))", "inline": true}]')

          # Add run link
          FIELDS=$(echo "$FIELDS" | jq --arg run_url "$RUN_URL" \
            '. + [{"name": "🔗 Actions Run", "value": "[View Run](\($run_url))", "inline": true}]')

          PAYLOAD=$(jq -n \
            --arg title "$STATUS" \
            --arg desc "Production deployment for \`${REF_NAME}\`" \
            --argjson color "$COLOR" \
            --argjson fields "$FIELDS" \
            --arg footer "Primal Grid CI • ${REPOSITORY}" \
            '{
              "username": "Squad: Joelle",
              "embeds": [{
                "title": $title,
                "description": $desc,
                "color": $color,
                "fields": $fields,
                "footer": { "text": $footer }
              }]
            }')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" = "204" ] || [ "$HTTP_STATUS" = "200" ]; then
            echo "Discord notification sent successfully (HTTP ${HTTP_STATUS})"
          else
            echo "::warning::Discord notification failed with HTTP ${HTTP_STATUS}"
          fi
