name: Squad PR Review Routing

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-reviewer:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto-assign reviewer based on target branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const targetBranch = pr.base.ref;
            const author = pr.user.login;
            const action = context.payload.action;

            // On synchronize (new push), re-request copilot review for uat PRs
            if (action === 'synchronize') {
              if (targetBranch === 'uat') {
                try {
                  // Dismiss stale copilot review so it gets re-requested
                  const { data: reviews } = await github.rest.pulls.listReviews({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                  });
                  const copilotReview = reviews.find(r =>
                    r.user?.login === 'copilot-pull-request-reviewer[bot]' ||
                    r.user?.login === 'copilot-pull-request-reviewer'
                  );
                  if (copilotReview) {
                    await github.rest.pulls.dismissReview({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      review_id: copilotReview.id,
                      message: 'New commits pushed — re-requesting review.',
                    });
                    core.info('Dismissed stale copilot review to trigger re-review');
                  }
                } catch (err) {
                  core.warning(`Could not dismiss copilot review: ${err.message}`);
                }
              }
              // Don't post routing comments on every push
              return;
            }

            // First-time routing (opened / ready_for_review)
            let reviewer = null;
            let comment = '';

            if (targetBranch === 'dev') {
              comment = [
                '### 🔍 PR Review Routing',
                '',
                `**Target:** \`${targetBranch}\``,
                `**Reviewer:** Hal (Lead — code review)`,
                '',
                '> This PR targets `dev`. Hal will review for code quality and architectural alignment.',
                '> To trigger review, start a Copilot session and say: `Hal, review PR #' + pr.number + '`',
              ].join('\n');

            } else if (targetBranch === 'uat') {
              comment = [
                '### 🔍 PR Review Routing',
                '',
                `**Target:** \`${targetBranch}\``,
                `**Reviewer:** @copilot (automated review)`,
                '',
                '> This PR promotes code to UAT. @copilot will review for test coverage and CI status.',
              ].join('\n');

            } else if (targetBranch === 'prod') {
              reviewer = 'dkirby-ms';
              comment = [
                '### 🔍 PR Review Routing',
                '',
                `**Target:** \`${targetBranch}\``,
                `**Reviewer:** @dkirby-ms (manual production gate)`,
                '',
                '> This PR promotes code to production. Only the repository owner should merge.',
              ].join('\n');
            }

            if (!comment) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment
            });

            if (reviewer && reviewer !== author) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  reviewers: [reviewer]
                });
                core.info(`Requested review from ${reviewer}`);
              } catch (err) {
                core.warning(`Could not request review from ${reviewer}: ${err.message}`);
              }
            }

            core.info(`PR #${pr.number} → ${targetBranch}: routed review`);
